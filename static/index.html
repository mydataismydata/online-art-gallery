<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Gallery</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%96%BC%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header id="topbar">
  <a class="brand" href="#/">The Gallery</a>
  <div class="topright">
    <nav id="mainnav"></nav>
    <div id="userbox"></div>
  </div>
</header>
<main id="app"></main>

<div id="viewer" class="fit">
  <div id="vstage"><img id="vimg" alt=""></div>
  <div id="vspin"></div>
  <button id="vprev" class="vnav" aria-label="Previous">&#8249;</button>
  <button id="vnext" class="vnav" aria-label="Next">&#8250;</button>
  <button id="vclose" aria-label="Close">&#215;</button>
  <div id="vcount"></div>
  <div id="vcap"></div>
  <div id="placard" hidden></div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
