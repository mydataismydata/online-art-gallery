<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Gallery</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<!-- One screen per file, in cascade order: base first (every other file leans on
     its tokens), breakpoints last (see responsive.css for why they live together). -->
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/grids.css">
<link rel="stylesheet" href="/static/css/artist.css">
<link rel="stylesheet" href="/static/css/browse.css">
<link rel="stylesheet" href="/static/css/collections.css">
<link rel="stylesheet" href="/static/css/connections.css">
<link rel="stylesheet" href="/static/css/forms.css">
<link rel="stylesheet" href="/static/css/settings.css">
<link rel="stylesheet" href="/static/css/viewer.css">
<link rel="stylesheet" href="/static/css/overlays.css">
<link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body>
<header id="topbar">
  <a class="brand" href="#/">
    <span class="brand-eyebrow" hidden></span>
    <span class="brand-name full">The Gallery</span>
    <span class="brand-name compact"></span>
  </a>
  <button id="navtoggle" type="button" aria-label="Menu" aria-expanded="false" aria-controls="topright">
    <span></span><span></span><span></span>
  </button>
  <div class="topright" id="topright">
    <nav id="mainnav"></nav>
    <div id="userbox"></div>
  </div>
</header>
<main id="app"></main>
<footer id="foot" hidden>
  <span class="foot-mark"></span>
  <span class="foot-stats"></span>
</footer>

<div id="viewer" class="fit">
  <div id="vstage"><img id="vimg" alt=""></div>
  <div id="vscrim"></div>
  <div id="vspin"></div>
  <button id="vprev" class="vnav" aria-label="Previous">&#8249;</button>
  <button id="vnext" class="vnav" aria-label="Next">&#8250;</button>
  <button id="vclose" aria-label="Close">&#215;</button>
  <div id="vcount"></div>
  <div id="vartist"></div>
  <div id="vfilm"></div>
  <div id="vhints">P — placard<br>← → — navigate</div>
  <div id="vcap"></div>
  <div id="placard" hidden></div>
  <button id="plpill" type="button" aria-label="Show placard"><span class="i">i</span> Placard</button>
</div>

<script src="/static/app.js"></script>
</body>
</html>
