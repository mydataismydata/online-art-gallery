<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Gallery</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header id="topbar">
  <a class="brand" href="#/">The Gallery</a>
  <div class="topright">
    <nav id="mainnav"></nav>
    <div id="userbox"></div>
  </div>
</header>
<main id="app"></main>

<div id="viewer" class="fit">
  <div id="vstage"><img id="vimg" alt=""></div>
  <div id="vspin"></div>
  <button id="vprev" class="vnav" aria-label="Previous">&#8249;</button>
  <button id="vnext" class="vnav" aria-label="Next">&#8250;</button>
  <button id="vclose" aria-label="Close">&#215;</button>
  <div id="vcount"></div>
  <div id="vcap"></div>
  <div id="placard" hidden></div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
